{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="card" style="max-width:400px; margin:0 auto;">
    <h2 style="margin-top:0;">Autentificare</h2>
    <form method="POST" action="{{ url_for('auth.login') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <label>Email</label>
        <input type="email" name="email" required placeholder="user@company.ro">
        <label>Parolă</label>
        <input type="password" name="password" required placeholder="Parolă">
        <button type="submit" class="btn btn-primary" style="width:100%;">Login</button>
    </form>
    <p style="margin-top:16px; font-size:13px;"><a href="{{ url_for('auth.register') }}">Nu ai cont? Înregistrează-te</a></p>
</div>
{% endblock %}
